<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verifikasi — NetSuite Console</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% include "_flash.html" %}
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand"><span class="brand-dot"></span><span>NetSuite Console</span></div>
      <h1 class="auth-title">Verifikasi email</h1>
      <p class="auth-sub">Masukkan kode 6 digit yang baru saja dikirim ke email Anda. Kode berlaku 5 menit.</p>

      <form method="POST" action="{{ url_for('verify') }}">
        <div class="field otp">
          <label for="otp">Kode verifikasi</label>
          <input id="otp" name="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autofocus>
        </div>
        <button class="btn" type="submit">Verifikasi</button>
      </form>

      <p class="auth-foot"><a href="{{ url_for('login') }}">&larr; Kembali ke login</a></p>
    </div>
  </div>
</body>
</html>
