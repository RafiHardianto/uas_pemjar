<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftar — NetSuite Console</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% include "_flash.html" %}
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand"><span class="brand-dot"></span><span>NetSuite Console</span></div>
      <h1 class="auth-title">Buat akun baru</h1>
      <p class="auth-sub">Gunakan email aktif — dipakai untuk mengirim kode verifikasi setiap kali login.</p>

      <form method="POST" action="{{ url_for('register') }}">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6">
        </div>
        <button class="btn" type="submit">Daftar</button>
      </form>

      <p class="auth-foot">Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a></p>
    </div>
  </div>
</body>
</html>
